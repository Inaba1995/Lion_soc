{% extends "base.html" %}
{% block title %}Search — MiniSocial{% endblock %}
{% block content %}
<h2>Search Users</h2>
<form class="d-flex mb-4" method="get">
  <input class="form-control me-2" name="q" value="{{ query }}" placeholder="Search by username...">
  <button class="btn btn-primary" type="submit">Search</button>
</form>
{% for u in users %}
  <div class="card mb-2">
    <div class="card-body d-flex justify-content-between">
      <span><i class="bi bi-person-circle"></i> <a href="{% url 'profile' u.username %}">@{{ u.username }}</a></span>
      <a href="{% url 'follow-toggle' u.username %}" class="btn btn-sm btn-outline-primary">Follow</a>
    </div>
  </div>
{% empty %}
  {% if query %}<p class="text-muted">No users found.</p>{% endif %}
{% endfor %}
{% endblock %}
