<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MiniSocial{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'feed' %}">MiniSocial</a>
      {% if user.is_authenticated %}
        <form class="d-flex mx-auto" action="{% url 'feed' %}" method="get">
          <input class="form-control form-control-sm me-2" name="q" placeholder="Search posts..." value="{{ query|default:'' }}">
          <button class="btn btn-outline-light btn-sm"><i class="bi bi-search"></i></button>
        </form>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{% url 'notifications' %}"><i class="bi bi-bell"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'inbox' %}"><i class="bi bi-envelope"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'profile' user.username %}">{{ user.username }}</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
        </ul>
      {% endif %}
    </div>
  </nav>

  <div class="container mt-4">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
