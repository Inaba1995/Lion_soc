<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MiniSocial{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --dark-yellow: #b8860b;
      --dark-yellow-hover: #9a7209;
      --black: #0d0d0d;
      --dark-gray: #1a1a1a;
      --medium-gray: #2a2a2a;
      --light-gray: #8a8a8a;
      --text-light: #e0e0e0;
    }
    body {
      background: var(--black);
      color: var(--text-light);
    }
    .navbar {
      background: var(--dark-gray) !important;
      border-bottom: 2px solid var(--dark-yellow);
    }
    .navbar-brand {
      color: var(--dark-yellow) !important;
    }
    .navbar-brand:hover {
      color: #d4a017 !important;
    }
    .nav-link {
      color: var(--text-light) !important;
    }
    .nav-link:hover {
      color: var(--dark-yellow) !important;
    }
    .card {
      background: var(--dark-gray);
      border: 1px solid var(--medium-gray);
      border-radius: 12px;
      color: var(--text-light);
    }
    .card-header {
      background: var(--medium-gray);
      border-bottom: 1px solid var(--dark-yellow);
      color: var(--dark-yellow);
    }
    .btn-primary {
      background: var(--dark-yellow);
      border-color: var(--dark-yellow);
      color: #000;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: var(--dark-yellow-hover);
      border-color: var(--dark-yellow-hover);
      color: #000;
    }
    .btn-outline-primary {
      border-color: var(--dark-yellow);
      color: var(--dark-yellow);
    }
    .btn-outline-primary:hover {
      background: var(--dark-yellow);
      border-color: var(--dark-yellow);
      color: #000;
    }
    .btn-outline-danger {
      border-color: #8b3a3a;
      color: #cc5555;
    }
    .btn-outline-danger:hover {
      background: #8b3a3a;
      color: #fff;
    }
    .btn-outline-secondary {
      border-color: var(--light-gray);
      color: var(--light-gray);
    }
    .btn-outline-secondary:hover {
      background: var(--light-gray);
      color: #000;
    }
    a {
      color: var(--dark-yellow);
    }
    a:hover {
      color: #d4a017;
    }
    .text-muted {
      color: var(--light-gray) !important;
    }
    .form-control {
      background: var(--medium-gray);
      border: 1px solid #3a3a3a;
      color: var(--text-light);
    }
    .form-control:focus {
      background: var(--medium-gray);
      border-color: var(--dark-yellow);
      color: var(--text-light);
      box-shadow: 0 0 0 0.2rem rgba(184, 134, 11, 0.25);
    }
    .form-select {
      background: var(--medium-gray);
      border: 1px solid #3a3a3a;
      color: var(--text-light);
    }
    .list-group-item {
      background: var(--dark-gray);
      border-color: var(--medium-gray);
      color: var(--text-light);
    }
    .alert-info {
      background: #1a2a1a;
      border-color: var(--dark-yellow);
      color: var(--dark-yellow);
    }
    .bg-light {
      background: var(--medium-gray) !important;
    }
    .text-primary {
      color: var(--dark-yellow) !important;
    }
    .badge {
      background: var(--dark-yellow) !important;
      color: #000;
    }
    footer {
      color: var(--light-gray) !important;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'feed' %}">MiniSocial</a>
      {% if user.is_authenticated %}
        <form class="d-flex mx-auto" action="{% url 'feed' %}" method="get">
          <input class="form-control form-control-sm me-2" name="q" placeholder="Search posts..." value="{{ query|default:'' }}">
          <button class="btn btn-outline-primary btn-sm"><i class="bi bi-search"></i></button>
        </form>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{% url 'notifications' %}"><i class="bi bi-bell"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'inbox' %}"><i class="bi bi-envelope"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'profile' user.username %}">{{ user.username }}</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
        </ul>
      {% endif %}
    </div>
  </nav>

  <div class="container mt-4">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <footer class="container mt-5 mb-3 text-center small">
    &copy; 2026 MiniSocial
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
